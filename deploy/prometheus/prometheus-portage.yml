# Prometheus scrape configuration for Portage Engine
# Add this to your prometheus.yml under scrape_configs:

scrape_configs:
  - job_name: 'portage-engine-server'
    scrape_interval: 15s
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          component: 'server'

    # If metrics password is set, use basic_auth:
    # basic_auth:
    #   username: 'metrics'
    #   password: 'your-metrics-password'

# Note: the builder process does not expose a /metrics endpoint, so there is
# no scrape job for it.
