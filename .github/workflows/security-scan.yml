name: Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # 每周一凌晨 UTC 运行一次
    - cron: '0 0 * * 1'

jobs:
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Display Trivy results
        if: always()
        run: |
          if [ -f trivy-results.json ]; then
            echo "=== Trivy Scan Results ==="
            cat trivy-results.json | jq '.Results[]? | select(.Vulnerabilities != null) | {Resource: .Target, VulnerabilityCount: (.Vulnerabilities | length)}' | head -50
          fi

  gosec-scan:
    name: GoSec Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Excluded rules (see .gosec.json for the rationale):
      #   G204 subprocess: all calls use argv form with validated inputs.
      #   G304 file inclusion: paths come from operator config, not request bodies.
      #   G401/G501/G505 weak crypto: SHA1/MD5 are MANDATED by the Portage
      #     binary-package "Packages" index format; they are checksums, not a
      #     security control.
      #   G301/G302/G306 file perms: the binhost index, Portage config files
      #     (binrepos.conf, make.conf), and the executable deploy script are
      #     world-readable / owner-executable BY DESIGN — a binhost that emerge
      #     cannot read is useless.
      # Run gosec under the project's Go toolchain (installed via `go install`)
      # rather than the securego/gosec Docker action, whose bundled Go (1.23) is
      # too old to load a module requiring a newer Go — the image sets
      # GOTOOLCHAIN=local, so it cannot download the required toolchain and every
      # package fails to load. gosec is pinned to a release (not @latest) so new
      # experimental rules do not spuriously break CI; -severity medium fails on
      # real issues.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4

      - name: Run gosec security scanner
        run: gosec -severity=medium -exclude=G204,G304,G301,G302,G306,G401,G501,G505 -conf .gosec.json -fmt=json -out gosec-results.json -stdout ./...

      - name: Display gosec results
        if: always()
        run: |
          if [ -f gosec-results.json ]; then
            echo "=== GoSec Scan Results ==="
            ISSUE_COUNT=$(cat gosec-results.json | jq '.Issues | length')
            echo "Total Issues Found: $ISSUE_COUNT"
            if [ "$ISSUE_COUNT" -gt 0 ]; then
              echo "Showing first 20 issues:"
              cat gosec-results.json | jq '.Issues[] | {Rule: .rule_id, File: .file, Line: .line, Severity: .severity, Details: .details}' | head -100
            else
              echo "No security issues found! ✓"
            fi
          fi

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: /home/runner/work/portage-engine/results/
          retention-days: 7
        continue-on-error: true

      - name: CodeQL Analysis Summary
        if: always()
        run: echo "CodeQL analysis completed. Check the Security tab in GitHub for detailed results if code scanning is enabled, or download the artifacts to view the SARIF file."
