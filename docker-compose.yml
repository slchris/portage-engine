# Portage Engine Docker Compose Example
# This demonstrates the full architecture:
#   - Server (local): Receives requests and dispatches to builders
#   - Builder 1 & 2 (remote): Build packages using Docker containers
#   - Dashboard (local): Web UI for monitoring
#
# NOTE: The builders run real Gentoo builds inside Docker containers
# (USE_DOCKER=true), so they need access to a Docker daemon. This example
# bind-mounts the host's Docker socket (/var/run/docker.sock) into each builder
# and installs the docker CLI at startup. This is "Docker-out-of-Docker": the
# builders drive the HOST Docker daemon. Ensure the host user running Compose
# can access the Docker socket.
#
# The Go base image (golang:1.25.3) matches the version in go.mod; an older
# image (e.g. golang:1.21) cannot build this project.

services:
  # Portage Engine Server (local control plane)
  portage-server:
    image: golang:1.25.3
    container_name: portage-server
    working_dir: /app
    volumes:
      - ./:/app
      - gomod-cache:/go/pkg/mod
      - gobuild-cache:/root/.cache/go-build
    ports:
      - "18080:8080"
    # Build the binary OUTSIDE the bind mount (so host-built darwin binaries in
    # ./bin are not clobbered), then run it with a non-existent config path so
    # the server uses built-in defaults + the environment below. (Passing a
    # shipped .conf would win over these env vars — config-file values take
    # precedence — and point the demo at placeholder hosts.)
    command: >
      sh -c "go build -o /usr/local/bin/portage-server cmd/server/main.go &&
             portage-server -config /nonexistent.conf"
    environment:
      # Env var names must match what pkg/config reads (see config.go).
      - REMOTE_BUILDERS=http://builder1:9090,http://builder2:9090
      - DATA_DIR=/tmp/portage-engine/server
      - BINPKG_PATH=/tmp/portage-engine/binpkgs
      - STORAGE_LOCAL_DIR=/tmp/portage-engine/binpkgs
    networks:
      - portage-net
    depends_on:
      - builder1
      - builder2

  # Builder Instance 1 (remote builder)
  builder1:
    image: golang:1.25.3
    container_name: portage-builder1
    working_dir: /app
    volumes:
      - ./:/app
      - gomod-cache:/go/pkg/mod
      - gobuild-cache:/root/.cache/go-build
      # Docker-out-of-Docker: builders drive the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - builder1-work:/var/tmp/portage-builds
      - builder1-artifacts:/var/tmp/portage-artifacts
    ports:
      - "9091:9090"
    # Install the docker CLI (needed for USE_DOCKER builds), build, then run.
    command: >
      sh -c "(apt-get update && apt-get install -y --no-install-recommends docker.io || true) &&
             go build -o /usr/local/bin/portage-builder cmd/builder/main.go &&
             portage-builder -config /nonexistent.conf -port 9090"
    environment:
      - BUILDER_WORKERS=2
      - USE_DOCKER=true
      - DOCKER_IMAGE=gentoo/stage3:latest
      - BUILD_WORK_DIR=/var/tmp/portage-builds
      - BUILD_ARTIFACT_DIR=/var/tmp/portage-artifacts
      - GPG_ENABLED=false
      # Register + heartbeat with the server so the dashboard's Build Nodes
      # page shows this builder.
      - SERVER_URL=http://portage-server:8080
      - BUILDER_ADVERTISE_URL=http://builder1:9090
      - INSTANCE_ID=builder1
      - ARCHITECTURE=amd64
    networks:
      - portage-net

  # Builder Instance 2 (remote builder)
  builder2:
    image: golang:1.25.3
    container_name: portage-builder2
    working_dir: /app
    volumes:
      - ./:/app
      - gomod-cache:/go/pkg/mod
      - gobuild-cache:/root/.cache/go-build
      # Docker-out-of-Docker: builders drive the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - builder2-work:/var/tmp/portage-builds
      - builder2-artifacts:/var/tmp/portage-artifacts
    ports:
      - "9092:9090"
    command: >
      sh -c "(apt-get update && apt-get install -y --no-install-recommends docker.io || true) &&
             go build -o /usr/local/bin/portage-builder cmd/builder/main.go &&
             portage-builder -config /nonexistent.conf -port 9090"
    environment:
      - BUILDER_WORKERS=2
      - USE_DOCKER=true
      - DOCKER_IMAGE=gentoo/stage3:latest
      - BUILD_WORK_DIR=/var/tmp/portage-builds
      - BUILD_ARTIFACT_DIR=/var/tmp/portage-artifacts
      - GPG_ENABLED=false
      - SERVER_URL=http://portage-server:8080
      - BUILDER_ADVERTISE_URL=http://builder2:9090
      - INSTANCE_ID=builder2
      - ARCHITECTURE=amd64
    networks:
      - portage-net

  # Dashboard (local web UI). Auth is enabled so the full experience —
  # landing page → sign in → console — can be exercised. Demo credentials:
  # admin / portage-demo (change for anything beyond a local demo).
  portage-dashboard:
    image: golang:1.25.3
    container_name: portage-dashboard
    working_dir: /app
    volumes:
      - ./:/app
      - gomod-cache:/go/pkg/mod
      - gobuild-cache:/root/.cache/go-build
    ports:
      - "8081:8081"
    command: >
      sh -c "go build -o /usr/local/bin/portage-dashboard cmd/dashboard/main.go &&
             portage-dashboard -config /nonexistent.conf"
    environment:
      # Point the dashboard at the server service on the compose network.
      - SERVER_URL=http://portage-server:8080
      - AUTH_ENABLED=true
      - JWT_SECRET=compose-demo-jwt-secret-0123456789abcdef
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=portage-demo
      - ALLOW_ANONYMOUS=false
    networks:
      - portage-net
    depends_on:
      - portage-server

networks:
  portage-net:
    driver: bridge

volumes:
  gomod-cache:
  gobuild-cache:
  builder1-work:
  builder1-artifacts:
  builder2-work:
  builder2-artifacts:
