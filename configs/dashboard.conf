# Portage Engine Dashboard Configuration

# Dashboard server port
DASHBOARD_PORT=8081

# Portage Engine server URL.
# Replace SERVER_HOST with your server's hostname or IP.
SERVER_URL=http://SERVER_HOST:8080

# API key the dashboard presents to the backend server (must equal the
# server's API_KEY when the server has authentication enabled).
SERVER_API_KEY=

# Authentication settings.
#
# Authentication ships DISABLED so the dashboard starts out of the box with the
# default config. For any non-local / production deployment you MUST:
#   1. Set AUTH_ENABLED=true
#   2. Set a strong JWT_SECRET (>= 32 chars): openssl rand -hex 32
#   3. Set ADMIN_USER / ADMIN_PASSWORD below (needed when ALLOW_ANONYMOUS=false)
#
# When AUTH_ENABLED=true the dashboard REFUSES to start if JWT_SECRET is empty,
# too short, or a well-known insecure value (e.g. "change-me-in-production").
AUTH_ENABLED=false
# JWT secret for signing tokens. MUST be at least 32 characters when
# AUTH_ENABLED=true. Generate with: openssl rand -hex 32
JWT_SECRET=
ALLOW_ANONYMOUS=false

# Operator login credentials. Required when AUTH_ENABLED=true and
# ALLOW_ANONYMOUS=false; the login endpoint issues a signed JWT only for
# these credentials.
ADMIN_USER=admin
ADMIN_PASSWORD=
# Issued-token lifetime in minutes (default 720 = 12h).
TOKEN_TTL_MINUTES=720

# Metrics configuration
METRICS_ENABLED=false
METRICS_PORT=2112
# METRICS_PASSWORD=your-secure-password-here

# Logging configuration
LOG_ENABLED=true
LOG_LEVEL=INFO
LOG_DIR=/var/log/portage-engine
LOG_MAX_SIZE_MB=100
LOG_MAX_AGE_DAYS=30
LOG_MAX_BACKUPS=10
LOG_ENABLE_CONSOLE=true
LOG_ENABLE_FILE=true
