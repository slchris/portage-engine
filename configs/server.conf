# Portage Engine Server Configuration
#
# This file holds BOOTSTRAP configuration only: ports, data paths, and
# security material the server needs before it can serve anything.
#
# Everything operational — cloud providers (PVE/GCP/AWS), static builder
# list, SSH deployment, builder binary delivery, instance TTL — is managed at
# runtime in the web dashboard (Settings page). Those settings persist to
# DATA_DIR/cloud-settings.json and survive restarts. The CLOUD_* /
# REMOTE_BUILDERS environment variables are still honored as initial defaults
# for headless bootstrap, but the dashboard-saved values override them.
#
# Precedence for every key: process environment > this file > built-in default.

# Server bind port
SERVER_PORT=8080

# Binary package repository (the binhost PKGDIR served at /binpkgs)
BINPKG_PATH=/var/cache/binpkgs

# Maximum concurrent build workers
MAX_WORKERS=5

# Storage for build artifacts: local (s3/http not yet implemented)
STORAGE_TYPE=local
STORAGE_LOCAL_DIR=/var/cache/binpkgs

# ===== Data Persistence =====
# Directory for server state: build records, dashboard-managed settings
# (cloud-settings.json), and job history. Must be writable.
DATA_DIR=/var/lib/portage-engine/server

# ===== GPG signing =====
# Binary package signing. Key material is filesystem-bound, so this stays in
# bootstrap config.
GPG_ENABLED=false
GPG_KEY_ID=
GPG_KEY_PATH=
GPG_AUTO_CREATE=true
GPG_KEY_NAME=Portage Engine
GPG_KEY_EMAIL=portage@localhost
GPG_HOME=/var/lib/portage-engine/gpg
GPG_PUBLIC_KEY_PATH=/var/lib/portage-engine/gpg/public.asc

# ===== Security =====
# API key for authenticating API requests (X-API-Key or Bearer header).
# Leave empty to disable authentication (NOT recommended for production).
# Generate with: openssl rand -hex 32
API_KEY=

# Shared secret the server presents to remote builders. Must equal the
# builder's BUILDER_TOKEN. Leave empty only if builders are unauthenticated
# (NOT recommended — the build endpoint runs code as root).
# Generate with: openssl rand -hex 32
BUILDER_TOKEN=

# CORS allowed origins (comma-separated). Empty allows all origins (*).
CORS_ALLOWED_ORIGINS=

# Maximum request body size in bytes (default: 10485760 = 10MB)
MAX_REQUEST_BODY_BYTES=10485760

# ===== Metrics =====
# METRICS_ENABLED=true exposes Prometheus metrics at GET /metrics on the main
# port (see deploy/prometheus/prometheus-portage.yml for a scrape job).
METRICS_ENABLED=false
# METRICS_PASSWORD=your-secure-password-here
